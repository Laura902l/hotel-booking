[tool.ruff]
line-length = 88
target-version = "py310"

exclude = [
    ".git",
    "__pycache__",
    "migrations",
    "venv",
]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "I",   # isort
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
]

ignore = [
    "E501",  # line too long (если используешь black)
]